name: Contracts CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Run workspace tests with backtrace
        working-directory: Contracts
        env:
          RUST_BACKTRACE: 1
        run: cargo test --all -- --nocapture --test-threads=1
