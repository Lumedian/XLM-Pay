name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: ./Backend

jobs:
  type-check:
    runs-on: ubuntu-latest
    name: Type Checking
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run TypeScript type checking
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          
          if [ -z "$(ls -A dist/)" ]; then
            echo "Build failed: dist directory is empty"
            exit 1
          fi
          
          echo "Build successful: $(ls -la dist/ | wc -l) files generated"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: Backend/dist/
          retention-days: 5

  startup-test:
    runs-on: ubuntu-latest
    name: Application Startup Test
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build project
        run: npm run build

      - name: Install pm2 globally
        run: npm install -g pm2

      - name: Create .env file for testing
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "PORT=3001" >> .env
          cat .env

      - name: Start application in background
        run: |
          # Set environment variable for test mode
          export NODE_ENV=test
          export PORT=3001

          ENTRYPOINT="dist/main.js"
          if [ ! -f "$ENTRYPOINT" ]; then
            ENTRYPOINT="dist/src/main.js"
          fi

          if [ ! -f "$ENTRYPOINT" ]; then
            echo "Application entrypoint not found"
            find dist -maxdepth 2 -name "main.js" || true
            exit 1
          fi
          
          # Start the application using pm2
          pm2 start "$ENTRYPOINT" --name "backend-app"
          
          # Wait a bit for the app to start
          sleep 10
          
          # Check if the process is running
          pm2 status

      - name: Health check
        run: |
          # Wait a bit more for the server to start
          sleep 10
          
          # Try to reach the server (if it has a health endpoint)
          # For now, we'll just verify that the process is running
          APP_PID=$(pm2 pid backend-app)
          if [ -z "$APP_PID" ] || [ "$APP_PID" = "0" ]; then
            echo "Application failed to start properly"
            pm2 logs backend-app --lines 50 --nostream || echo "No logs available"
            exit 1
          fi
          
          echo "Application started successfully"

      - name: Stop application
        if: always()
        run: |
          pm2 stop all || true
          pm2 delete all || true
          pkill -f "node.*dist/src/main" || true
          pkill -f "node.*dist/main" || true

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          npm outdated || echo "Some packages are outdated (this is not necessarily an error)"

      - name: Validate package integrity
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "ERROR: package-lock.json not found!"
            exit 1
          fi
          
          echo "Verifying package-lock.json integrity..."
          npm ls --depth=0 > /dev/null
          if [ $? -ne 0 ]; then
            echo "ERROR: Dependency tree validation failed!"
            npm ls --depth=0
            exit 1
          fi
          
          echo "Dependency validation passed!"

  combined-check:
    runs-on: ubuntu-latest
    name: All Checks Combined
    needs: [type-check, build, startup-test, dependency-check]
    steps:
      - name: Confirm all checks passed
        run: echo "All CI checks passed successfully!"
